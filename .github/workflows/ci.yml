name: CI

on:
  push:
    branches: [main, develop, "feat/**"]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  GEMINI_API_KEY: "ci-dummy-key"
  TAVILY_API_KEY: "ci-dummy-key"

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff
          pip install -r requirements.txt

      - name: Ruff format check
        run: ruff format --check .

      - name: Ruff lint check
        run: ruff check .

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: content_factory_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d content_factory_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Run Alembic migrations
        env:
          DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/content_factory_test
        run: alembic upgrade head

      - name: Run unit tests
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/content_factory_test
          GEMINI_API_KEY: ${{ env.GEMINI_API_KEY }}
          TAVILY_API_KEY: ${{ env.TAVILY_API_KEY }}
        run: pytest -v -m unit --tb=short -x --ignore-glob="**/conftest.py" || [ $? -eq 5 ]

  agent-tests:
    name: Agent Structure Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Run agent tests (mocked LLM)
        env:
          GEMINI_API_KEY: ${{ env.GEMINI_API_KEY }}
          TAVILY_API_KEY: ${{ env.TAVILY_API_KEY }}
        run: pytest -v -m agent --tb=short -x --ignore-glob="**/conftest.py" || [ $? -eq 5 ]

  eval-tests:
    name: AI Evaluation Tests
    runs-on: ubuntu-latest
    needs: [unit-tests, agent-tests]
    if: github.event_name == 'pull_request'
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: content_factory_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d content_factory_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Run Alembic migrations
        env:
          DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/content_factory_test
        run: alembic upgrade head

      - name: Run AI eval tests (real LLM)
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/content_factory_test
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || 'ci-dummy-key' }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY || 'ci-dummy-key' }}
        run: pytest -v -m eval --tb=short -x --ignore-glob="**/conftest.py" || [ $? -eq 5 ]

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [unit-tests, agent-tests]
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: content_factory_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d content_factory_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Run Alembic migrations
        env:
          DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/content_factory_test
        run: alembic upgrade head

      - name: Run integration tests
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/content_factory_test
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || 'ci-dummy-key' }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY || 'ci-dummy-key' }}
        run: pytest -v -m integration --tb=short -x --ignore-glob="**/conftest.py" || [ $? -eq 5 ]

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t content-factory:ci .
