networks:
  factory-net:
    driver: bridge
    name: factory_isolated_net

volumes:
  pgdata:
    name: factory_pgdata

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: factory_db
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - factory-net
    healthcheck:
      # Crucial: Ensures Postgres is fully ready before API starts
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
  
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: factory_pgadmin
    restart: unless-stopped
    env_file: 
      - .env
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports: 
      - "5050:80"
    networks: 
      - factory-net
    depends_on: 
      db: 
        condition: service_healthy
    deploy: 
      resources: 
        limits: 
          cpus: '0.5' 
          memory: 512M 

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: factory_api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      # Bind mounts for live reloading and persisting migrations
      - ./app:/workspace/app
      - ./alembic:/workspace/alembic
      - ./alembic.ini:/workspace/alembic.ini
    networks:
      - factory-net
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G 